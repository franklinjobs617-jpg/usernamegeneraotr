<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9f9"/>
      <stop offset="100%" style="stop-color:#e0f2f2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative circles -->
  <circle cx="1100" cy="80" r="200" fill="#0d7a7b" opacity="0.07"/>
  <circle cx="100" cy="550" r="150" fill="#0d7a7b" opacity="0.05"/>
  <!-- logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#0d1a1a"/>
  <text x="116" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#0d7a7b">@</text>
  <!-- wordmark -->
  <text x="168" y="131" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#0d1a1a">User</text>
  <text x="313" y="131" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#0d7a7b">NameGen</text>
  <!-- headline -->
  <text x="80" y="280" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#0d1a1a">Username</text>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#0d7a7b">Generator</text>
  <!-- sub -->
  <text x="80" y="440" font-family="Arial,sans-serif" font-size="28" fill="#4a6060">Free · Instant · No sign-up required</text>
  <!-- badges -->
  <rect x="80" y="490" width="200" height="44" rx="22" fill="#0d7a7b"/>
  <text x="180" y="518" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="white">Instagram</text>
  <rect x="296" y="490" width="160" height="44" rx="22" fill="#0d1a1a"/>
  <text x="376" y="518" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="white">TikTok</text>
  <rect x="472" y="490" width="160" height="44" rx="22" fill="#0d3333"/>
  <text x="552" y="518" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#0d7a7b">Gaming</text>
  <rect x="648" y="490" width="160" height="44" rx="22" fill="#0d3333"/>
  <text x="728" y="518" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#0d7a7b">Discord</text>
</svg>
